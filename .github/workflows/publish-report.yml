name: Publish stock report

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-report.yml"
      - "README.md"
      - "scripts/**"
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - "wrangler.jsonc"
  schedule:
    - cron: "30 22 * * *"

permissions:
  contents: write

concurrency:
  group: publish-stock-report
  cancel-in-progress: true

env:
  DATA_BASE_URL: https://rawforcorvofeng.cn/stock/datadir
  DATA_MANIFEST_URL: https://rawforcorvofeng.cn/stock/datadir-manifest.txt
  PUBLISH_BRANCH: cloudflare-pages

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          uv sync --extra test

      - name: Build static site
        run: scripts/build-public-site.sh

      - name: Run tests
        run: uv run python -m pytest

      - name: Publish static branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd public
          git init -b "$PUBLISH_BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html symbols
          git commit -m "Publish stock digital report"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin "HEAD:${PUBLISH_BRANCH}"
