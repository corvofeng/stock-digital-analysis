name: Publish stock report

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/publish-report.yml"
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
  schedule:
    - cron: "30 22 * * *"

permissions:
  contents: write

concurrency:
  group: publish-stock-report
  cancel-in-progress: true

env:
  DATA_BASE_URL: https://rawforcorvofeng.cn/stock/datadir
  DATA_MANIFEST_URL: https://rawforcorvofeng.cn/stock/datadir-manifest.txt
  PUBLISH_BRANCH: cloudflare-pages

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          uv sync --extra test

      - name: Download DAT files
        run: |
          rm -rf datadir
          if curl --fail --location --retry 3 --retry-delay 2 \
            --output datadir-manifest.remote.txt \
            "$DATA_MANIFEST_URL"; then
            mv datadir-manifest.remote.txt datadir-manifest.txt
          fi
          while IFS= read -r relpath; do
            [ -n "$relpath" ] || continue
            mkdir -p "datadir/$(dirname "$relpath")"
            curl --fail --location --retry 3 --retry-delay 2 \
              --output "datadir/$relpath" \
              "$DATA_BASE_URL/$relpath"
          done < datadir-manifest.txt

      - name: Run tests
        run: uv run python -m pytest

      - name: Generate static report
        run: |
          mkdir -p public
          uv run stock-write-html datadir -o public/index.html --separate-symbol-pages

      - name: Publish static branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd public
          git init -b "$PUBLISH_BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html symbols
          git commit -m "Publish stock digital report"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin "HEAD:${PUBLISH_BRANCH}"
